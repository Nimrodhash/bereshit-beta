<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוגיות מוסריות בבראשית</title>
    
    <!-- Tailwind CSS (לעיצוב) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <!-- FontAwesome (לאייקונים) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (כדי שהדפדפן יבין קוד React) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase (למסד הנתונים) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1c] text-slate-800 dark:text-slate-200 transition-colors duration-300">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { createClient } = window.supabase;

        // --- מפתחות ה-API שלך ---
        const apiKey = "AIzaSyB6X-UCpmuAHB2On0Tc2U_4QE-RB9zxLII";
        const supabaseUrl = "https://osxdldgzmxosroskrpgp.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeGRsZGd6bXhvc3Jvc2tycGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzY5NTksImV4cCI6MjA4NzI1Mjk1OX0.wCWmD8SbWs7Kres1pm6BMocMcYNKpHN42jL_n_a5P2k"; 

        const supabaseClient = createClient(supabaseUrl, supabaseAnonKey);

        // --- רכיב אייקונים חלופי מבוסס FontAwesome ---
        const Icon = ({ name, className = "", size = "text-base" }) => (
            <i className={`fa-solid fa-${name} ${size} ${className}`}></i>
        );

        const shuffleQuizQuestions = (questions) => {
            if (!questions) return [];
            return questions.map(q => {
                const optionsWithMeta = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correctIndex }));
                for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
                }
                return {
                    ...q,
                    options: optionsWithMeta.map(o => o.text),
                    correctIndex: optionsWithMeta.findIndex(o => o.isCorrect)
                };
            });
        };

        const fetchGemini = async (prompt, systemInstruction, schema, attachedFiles = []) => {
            const maxRetries = 3;
            const delays = [1000, 3000, 6000];
            const parts = [{ text: prompt }];
            
            if (attachedFiles && attachedFiles.length > 0) {
                attachedFiles.forEach(file => {
                    if (file.isText) {
                        parts.push({ text: `\n\n[תוכן הקובץ: ${file.name}]\n${file.textContent}\n` });
                    } else if (file.base64) {
                        parts.push({ inlineData: { mimeType: file.type, data: file.base64 } });
                    }
                });
            }

            const payload = {
                contents: [{ role: "user", parts: parts }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: { responseMimeType: "application/json", responseSchema: schema }
            };

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let errorText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('input');
            const [activeSummaryId, setActiveSummaryId] = useState(null);
            const [theme, setTheme] = useState('dark');
            const [user, setUser] = useState(null);
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const CORRECT_PASSWORD = "1234";

            const [deleteModalOpen, setDeleteModalOpen] = useState(false);
            const [deleteSummaryId, setDeleteSummaryId] = useState(null);
            const [deletePassword, setDeletePassword] = useState('');

            const [topicName, setTopicName] = useState('');
            const [materialInput, setMaterialInput] = useState('');
            const [highlightsInput, setHighlightsInput] = useState('');
            const [attachedFiles, setAttachedFiles] = useState([]);
            const fileInputRef = useRef(null);
            
            const [summaries, setSummaries] = useState([]);
            const [isProcessingSummary, setIsProcessingSummary] = useState(false);
            
            const [examQuestions, setExamQuestions] = useState([]);
            const [isGeneratingExam, setIsGeneratingExam] = useState(false);
            const [examAnswers, setExamAnswers] = useState({});
            const [examSubmitted, setExamSubmitted] = useState(false);
            const [examScore, setExamScore] = useState(0);

            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });

            const showAlert = (title, message) => setModal({ isOpen: true, title, message, type: 'alert', onConfirm: null });
            const showConfirm = (title, message, onConfirm) => setModal({ isOpen: true, title, message, type: 'confirm', onConfirm });
            const closeModal = () => setModal({ ...modal, isOpen: false });

            useEffect(() => {
                const initAuth = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session?.user) {
                        setUser(session.user);
                    } else {
                        const { data, error } = await supabaseClient.auth.signInAnonymously();
                        if (data?.user) setUser(data.user);
                        if (error) console.error("Supabase auth error:", error.message);
                    }
                };
                initAuth();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange((event, session) => {
                    if (session?.user) setUser(session.user);
                });

                return () => authListener.subscription.unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const fetchSummaries = async () => {
                    const { data, error } = await supabaseClient
                        .from('summaries')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('created_at', { ascending: false });

                    if (data) {
                        setSummaries(data.map(row => ({ id: Number(row.id), ...row.summary_data })));
                    }
                };
                fetchSummaries();
            }, [user]);

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);

            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.name.toLowerCase().match(/\.(ppt|pptx)$/) || file.type.includes('presentation')) {
                        showAlert("המרת מצגת ל-PDF", `אנא שמור את הקובץ ${file.name} כ-PDF והעלה מחדש.`);
                        return;
                    }
                    if (file.size > 4 * 1024 * 1024) {
                        showAlert("קובץ גדול מדי", `הקובץ ${file.name} חורג מהגודל המותר (4MB).`);
                        return;
                    }
                    const isTextExt = file.name.toLowerCase().endsWith('.txt') || file.type === 'text/plain';
                    const reader = new FileReader();
                    
                    if (isTextExt) {
                        reader.onload = (event) => setAttachedFiles(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, type: 'text/plain', isText: true, textContent: event.target.result }]);
                        reader.readAsText(file);
                    } else {
                        reader.onload = (event) => {
                            const dataUrl = event.target.result;
                            setAttachedFiles(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, type: file.type, isText: false, dataUrl, base64: dataUrl.split(',')[1] }]);
                        };
                        reader.readAsDataURL(file);
                    }
                });
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const removeAttachedFile = (id) => setAttachedFiles(prev => prev.filter(f => f.id !== id));

            const handleProcessMaterial = async () => {
                if (!materialInput.trim() && attachedFiles.length === 0) return showAlert("חסר תוכן", "אנא הכנס חומר לפני העיבוד.");
                setIsProcessingSummary(true); setActiveTab('summaries'); setActiveSummaryId(null);

                const systemInstruction = `אתה סייען למידה אקדמי וערכי לקורס 'סוגיות מוסריות בספר בראשית'. 1. הבחן בין תתי-נושאים. 2. הבא דעות פרשנים רלוונטיים לכל תת-נושא. 3. תן דגש מרכזי ל"דגשי המרצה". 4. מסר ערכי מסכם. 5. לפחות 5 שאלות חזרה איכותיות מתוך החומר שהוזן בלבד. החזר JSON.`;
                let prompt = `${topicName.trim() ? `נושא: ${topicName}\n\n` : ''}חומר הלימוד:\n${materialInput}\n\nדגשי המרצה:\n${highlightsInput || 'אין'}`;
                
                const schema = {
                    type: "OBJECT",
                    properties: {
                        title: { type: "STRING" }, introduction: { type: "STRING" },
                        subTopics: { type: "ARRAY", items: { type: "OBJECT", properties: { topicTitle: { type: "STRING" }, explanation: { type: "STRING" }, commentators: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, opinion: { type: "STRING" } }, required: ["name", "opinion"] } } }, required: ["topicTitle", "explanation", "commentators"] } },
                        lecturerHighlights: { type: "STRING" }, moralConclusion: { type: "STRING" },
                        quiz: { type: "ARRAY", items: { type: "OBJECT", properties: { question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } }, correctIndex: { type: "INTEGER" } }, required: ["question", "options", "correctIndex"] } }
                    }, required: ["title", "introduction", "subTopics", "lecturerHighlights", "moralConclusion", "quiz"]
                };

                try {
                    const result = await fetchGemini(prompt, systemInstruction, schema, attachedFiles);
                    if (result.quiz) result.quiz = shuffleQuizQuestions(result.quiz);
                    
                    const newSummaryId = Date.now();
                    const newSummary = { ...result, id: newSummaryId, userAnswers: {}, quizSubmitted: false, sourceFiles: attachedFiles.map(f => ({ id: f.id, name: f.name, type: f.type })) };
                    
                    if (user) await supabaseClient.from('summaries').upsert({ id: newSummaryId.toString(), user_id: user.id, summary_data: newSummary });
                    
                    setSummaries(prev => [newSummary, ...prev]);
                    setTopicName(''); setMaterialInput(''); setHighlightsInput(''); setAttachedFiles([]); setActiveSummaryId(newSummary.id);
                } catch (error) {
                    showAlert("שגיאה בעיבוד", "אירעה שגיאה. ודא שהמפתחות הוגדרו נכון."); setActiveTab('input');
                } finally {
                    setIsProcessingSummary(false);
                }
            };

            const handleGenerateExam = async () => {
                if (summaries.length === 0) return showAlert("אין חומר", "אנא הזן חומר ולמד לפחות נושא אחד.");
                setIsGeneratingExam(true); setExamSubmitted(false); setExamAnswers({}); setExamScore(0);
                
                const accumulatedMaterial = summaries.map(s => `נושא: ${s.title}\nמבוא: ${s.introduction}\nפירוט:\n${s.subTopics?.map(st => `- ${st.topicTitle}: ${st.explanation}`).join('\n')}\nדגשי מרצה: ${s.lecturerHighlights}`).join('\n\n---\n\n');
                const systemInstruction = `אתה בוחן אוניברסיטה לקורס סוגיות בבראשית. השתמש *אך ורק* בחומר הלימוד המצורף. צור עד 30 שאלות. החזר JSON.`;
                const schema = { type: "OBJECT", properties: { questions: { type: "ARRAY", items: { type: "OBJECT", properties: { question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } }, correctIndex: { type: "INTEGER" } }, required: ["question", "options", "correctIndex"] } } }, required: ["questions"] };

                try {
                    const result = await fetchGemini(`חומר למבחן:\n\n${accumulatedMaterial}`, systemInstruction, schema, []);
                    if (result?.questions) setExamQuestions(shuffleQuizQuestions(result.questions));
                    else throw new Error("Format error");
                } catch (error) {
                    showAlert("שגיאה", "אירעה שגיאה בייצור המבחן.");
                } finally {
                    setIsGeneratingExam(false);
                }
            };

            const handleQuizAnswer = async (summaryId, questionIndex, answerIndex) => {
                setSummaries(prev => prev.map(s => {
                    if (s.id === summaryId) {
                        const updated = { ...s, userAnswers: { ...s.userAnswers, [questionIndex]: answerIndex } };
                        if (user) supabaseClient.from('summaries').update({ summary_data: updated }).eq('id', summaryId.toString());
                        return updated;
                    }
                    return s;
                }));
            };

            const submitQuiz = async (summaryId) => {
                setSummaries(prev => prev.map(s => {
                    if (s.id === summaryId) {
                        const updated = { ...s, quizSubmitted: true };
                        if (user) supabaseClient.from('summaries').update({ summary_data: updated }).eq('id', summaryId.toString());
                        return updated;
                    }
                    return s;
                }));
            };

            const handleDeleteSummary = (summaryId) => { setDeleteSummaryId(summaryId); setDeletePassword(''); setDeleteModalOpen(true); };

            const confirmDelete = async () => {
                if (deletePassword !== CORRECT_PASSWORD) return showAlert("שגיאה", "סיסמא שגויה.");
                if (user) await supabaseClient.from('summaries').delete().eq('id', deleteSummaryId.toString());
                setSummaries(prev => prev.filter(s => s.id !== deleteSummaryId));
                setActiveSummaryId(null); setDeleteModalOpen(false);
            };

            const submitExam = () => {
                if (Object.keys(examAnswers).length < examQuestions.length) showConfirm("חסרות תשובות", "להגיש כעת?", processExamSubmission);
                else processExamSubmission();
            };

            const processExamSubmission = () => {
                let correct = 0;
                examQuestions.forEach((q, i) => { if (examAnswers[i] === q.correctIndex) correct++; });
                setExamScore(Math.round((correct / examQuestions.length) * 100)); setExamSubmitted(true); window.scrollTo(0,0);
            };

            const getFileIcon = (mimeType) => {
                if (!mimeType) return "file text-cyan-500";
                if (mimeType.includes('image')) return "image text-pink-500";
                if (mimeType.includes('pdf')) return "file-pdf text-red-500";
                return "file text-cyan-500";
            };

            const TabButton = ({ id, iconName, label }) => {
                const isActive = activeTab === id;
                return (
                    <button onClick={() => { setActiveTab(id); if (id !== 'summaries') setActiveSummaryId(null); }} className={`flex items-center gap-2 px-6 py-4 transition-all duration-300 border-b-2 font-medium text-lg whitespace-nowrap ${isActive ? 'border-amber-500 text-amber-600 dark:text-amber-400 bg-amber-100 dark:bg-amber-400/10' : 'border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50'}`}>
                        <Icon name={iconName} size="text-xl" /> {label}
                    </button>
                );
            };

            const activeSummary = summaries.find(s => s.id === activeSummaryId);
            const bgApp = theme === 'dark' ? 'bg-[#0a0f1c]' : 'bg-slate-50';
            const textApp = theme === 'dark' ? 'text-slate-200' : 'text-slate-800';
            const bgCard = theme === 'dark' ? 'bg-[#131c31]' : 'bg-white';
            const borderCard = theme === 'dark' ? 'border-white/5' : 'border-slate-200';
            const textMuted = theme === 'dark' ? 'text-slate-400' : 'text-slate-600';
            const bgInput = theme === 'dark' ? 'bg-[#0a0f1c]/50' : 'bg-slate-50';
            const textHighlight = theme === 'dark' ? 'text-amber-300' : 'text-amber-700';

            return (
                <div className={`min-h-screen ${bgApp} ${textApp} font-sans relative`}>
                    
                    {modal.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className={`${bgCard} border ${borderCard} p-6 rounded-2xl shadow-2xl max-w-sm w-full`}>
                                <div className="flex items-center gap-3 mb-4">
                                    <Icon name={modal.type === 'alert' ? "circle-exclamation" : "book-open"} className={modal.type === 'alert' ? "text-red-500" : "text-amber-500"} size="text-3xl" />
                                    <h3 className="text-xl font-bold">{modal.title}</h3>
                                </div>
                                <p className={`${textMuted} mb-8`}>{modal.message}</p>
                                <div className="flex justify-end gap-3">
                                    {modal.type === 'confirm' && <button onClick={closeModal} className={`px-5 py-2.5 rounded-xl ${theme==='dark'?'bg-slate-800':'bg-slate-200'}`}>ביטול</button>}
                                    <button onClick={() => { if(modal.onConfirm) modal.onConfirm(); closeModal(); }} className={`px-6 py-2.5 rounded-xl text-white ${modal.type==='alert'?'bg-red-600':'bg-amber-600'}`}>אישור</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className={`${bgCard} border ${borderCard} p-6 rounded-2xl shadow-2xl max-w-sm w-full`}>
                                <div className="flex items-center gap-3 mb-4"><Icon name="trash" className="text-red-500" size="text-2xl" /><h3 className="text-xl font-bold">אימות מחיקה</h3></div>
                                <p className={`${textMuted} mb-4`}>הזן סיסמא לאישור מחיקה:</p>
                                <input type="password" value={deletePassword} onChange={e => setDeletePassword(e.target.value)} onKeyDown={e => e.key==='Enter' && confirmDelete()} className={`w-full ${bgInput} border ${borderCard} rounded-xl p-3 text-center mb-6`} placeholder="1234" autoFocus />
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setDeleteModalOpen(false)} className={`px-5 py-2.5 rounded-xl ${theme==='dark'?'bg-slate-800':'bg-slate-200'}`}>ביטול</button>
                                    <button onClick={confirmDelete} className="px-6 py-2.5 rounded-xl text-white bg-red-600">מחק</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className={`${theme==='dark'?'bg-[#0f172a]/90':'bg-white/90'} backdrop-blur-xl border-b ${borderCard} sticky top-0 z-50 shadow-sm`}>
                        <div className="max-w-5xl mx-auto px-4">
                            <div className="flex flex-col md:flex-row justify-between items-center py-5 gap-4">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-gradient-to-br from-amber-400 to-orange-600 rounded-2xl shadow-lg text-white"><Icon name="book-open" size="text-2xl" /></div>
                                    <div>
                                        <h1 className={`text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r ${theme==='dark' ? 'from-amber-200 to-amber-500' : 'from-amber-600 to-orange-700'}`}>סוגיות מוסריות בבראשית</h1>
                                        <p className="text-slate-500 text-sm mt-0.5">מרחב למידה אישי מבוסס AI</p>
                                    </div>
                                </div>
                                <button onClick={toggleTheme} className={`p-3 rounded-full ${theme === 'dark' ? 'bg-slate-800 text-amber-400' : 'bg-slate-200 text-slate-700'}`}><Icon name={theme==='dark'?'sun':'moon'} /></button>
                            </div>
                            <div className="flex overflow-x-auto no-scrollbar pt-2">
                                <TabButton id="input" iconName="pen-to-square" label="הזנת חומר" />
                                <TabButton id="summaries" iconName="list-check" label="למידה וסיכומים" />
                                <TabButton id="exam" iconName="graduation-cap" label="סימולציית מבחן" />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {activeTab === 'input' && (
                            <div className="space-y-6">
                                {!isUnlocked ? (
                                    <div className={`${bgCard} border ${borderCard} rounded-3xl p-8 max-w-md mx-auto shadow-2xl text-center mt-10`}>
                                        <Icon name="circle-exclamation" className="text-amber-500 mb-4 block" size="text-5xl" />
                                        <h2 className="text-2xl font-bold mb-4">אזור מוגן בסיסמא</h2>
                                        <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e => e.key==='Enter' && (passwordInput===CORRECT_PASSWORD ? setIsUnlocked(true) : showAlert("שגיאה", "סיסמא שגויה."))} className={`w-full ${bgInput} border ${borderCard} rounded-xl p-4 text-center mb-4`} placeholder="הזן סיסמא..." />
                                        <button onClick={() => passwordInput===CORRECT_PASSWORD ? setIsUnlocked(true) : showAlert("שגיאה", "סיסמא שגויה.")} className="w-full py-4 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold text-lg">היכנס לאזור ההזנה</button>
                                    </div>
                                ) : (
                                    <div className={`${bgCard} border ${borderCard} rounded-3xl p-6 md:p-8 shadow-2xl`}>
                                        <h2 className={`text-2xl font-semibold mb-6 flex items-center gap-2 ${textHighlight}`}><Icon name="lightbulb" /> הכנת חומר הלימוד</h2>
                                        <div className="space-y-6">
                                            <div>
                                                <label className={`block text-sm font-medium ${textMuted} mb-2`}>שם הנושא:</label>
                                                <input type="text" value={topicName} onChange={e => setTopicName(e.target.value)} className={`w-full ${bgInput} border ${borderCard} rounded-xl p-4`} placeholder="לדוגמה: עקידת יצחק" />
                                            </div>
                                            <div>
                                                <label className={`block text-sm font-medium ${textMuted} mb-2`}>חומר הלימוד:</label>
                                                <textarea value={materialInput} onChange={e => setMaterialInput(e.target.value)} className={`w-full h-40 ${bgInput} border ${borderCard} rounded-xl p-4 resize-none`} placeholder="הדבק כאן סיכומים..." />
                                            </div>
                                            <div className={`p-4 ${bgCard} border border-amber-500/30 rounded-xl`}>
                                                <label className="block text-sm font-medium text-amber-500 mb-2"><Icon name="star" /> דגשי המרצה:</label>
                                                <textarea value={highlightsInput} onChange={e => setHighlightsInput(e.target.value)} className={`w-full h-20 bg-transparent border-none outline-none resize-none`} placeholder="מה המרצה הדגיש?" />
                                            </div>
                                            <div className={`p-5 ${theme==='dark'?'bg-[#0a0f1c]/30':'bg-slate-50'} border ${borderCard} rounded-2xl`}>
                                                <div className="flex items-center justify-between mb-4">
                                                    <label className={`text-sm font-medium ${textMuted}`}><Icon name="paperclip" /> קבצים (PDF/תמונות/TXT)</label>
                                                    <button onClick={() => fileInputRef.current.click()} className={`px-4 py-2 rounded-lg border ${borderCard}`}>בחר קבצים</button>
                                                    <input type="file" multiple accept=".pdf, image/*, text/plain" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
                                                </div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                    {attachedFiles.map(file => (
                                                        <div key={file.id} className={`flex items-center justify-between ${bgCard} border ${borderCard} p-3 rounded-xl`}><div className="flex items-center gap-2 overflow-hidden"><i className={`fa-solid fa-${getFileIcon(file.type)}`}></i><span className="truncate text-sm">{file.name}</span></div><button onClick={()=>removeAttachedFile(file.id)} className="text-red-500"><Icon name="trash" /></button></div>
                                                    ))}
                                                </div>
                                            </div>
                                            <button onClick={handleProcessMaterial} disabled={(!materialInput.trim() && attachedFiles.length===0) || isProcessingSummary} className="w-full mt-6 py-4 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold text-lg disabled:opacity-50 flex items-center justify-center gap-2">
                                                {isProcessingSummary ? <><Icon name="spinner fa-spin" /> מעבד...</> : <><Icon name="wand-magic-sparkles" /> צור סיכום</>}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'summaries' && (
                            <div className="space-y-6">
                                {isProcessingSummary && <div className={`py-24 text-center ${bgCard} rounded-3xl border ${borderCard}`}><Icon name="spinner fa-spin" size="text-6xl" className="text-amber-500 mb-4 block" /><h3 className="text-2xl font-bold">מעבד נתונים...</h3></div>}
                                {!isProcessingSummary && summaries.length === 0 && <div className={`py-24 text-center ${bgCard} rounded-3xl border ${borderCard}`}><Icon name="book-open" size="text-6xl" className="text-slate-400 mb-4 block" /><h3 className="text-xl">אין סיכומים עדיין</h3></div>}
                                
                                {!isProcessingSummary && summaries.length > 0 && !activeSummaryId && (
                                    <div>
                                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-3"><Icon name="layer-group" className="text-amber-500" /> חומרי הלימוד שלי</h2>
                                        <div className="grid md:grid-cols-2 gap-5">
                                            {summaries.map(s => (
                                                <button key={s.id} onClick={() => setActiveSummaryId(s.id)} className={`text-right p-6 rounded-2xl border ${borderCard} ${bgCard} shadow-sm hover:shadow-md transition-all`}>
                                                    <h3 className={`text-xl font-bold ${textHighlight} mb-2`}>{s.title}</h3>
                                                    <p className={`text-sm ${textMuted} line-clamp-2`}>{s.introduction}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {!isProcessingSummary && activeSummary && (
                                    <div className={`${bgCard} border ${borderCard} rounded-3xl overflow-hidden shadow-xl`}>
                                        <div className={`p-6 border-b ${borderCard}`}>
                                            <button onClick={() => setActiveSummaryId(null)} className={`mb-6 px-4 py-2 rounded-full border ${borderCard} ${textMuted}`}><Icon name="chevron-right" /> חזור</button>
                                            <button onClick={() => handleDeleteSummary(activeSummary.id)} className="mb-6 mr-4 px-4 py-2 rounded-full border border-red-500/30 text-red-500"><Icon name="trash" /> מחיקה</button>
                                            <h3 className={`text-3xl font-bold ${textHighlight}`}>{activeSummary.title}</h3>
                                        </div>
                                        <div className="p-6 md:p-10 space-y-12">
                                            <p className="text-xl leading-relaxed">{activeSummary.introduction}</p>
                                            
                                            {activeSummary.subTopics?.map((sub, idx) => (
                                                <div key={idx} className={`p-6 rounded-2xl border ${borderCard} ${theme==='dark'?'bg-[#0a0f1c]/30':'bg-slate-50'}`}>
                                                    <h4 className={`text-2xl font-bold ${textHighlight} mb-4`}>{idx + 1}. {sub.topicTitle}</h4>
                                                    <p className="mb-6 leading-relaxed text-lg">{sub.explanation}</p>
                                                    {sub.commentators?.map((c, i) => (
                                                        <div key={i} className={`p-4 rounded-xl border ${borderCard} ${bgCard} mb-3`}><h6 className="font-bold mb-2"><Icon name="quote-right" className="text-amber-500 ml-2"/> {c.name}</h6><p className={`text-sm ${textMuted}`}>{c.opinion}</p></div>
                                                    ))}
                                                </div>
                                            ))}

                                            <div className="p-6 bg-amber-500/10 border border-amber-500/30 rounded-2xl">
                                                <h4 className="text-xl font-bold text-amber-500 mb-2"><Icon name="star" /> דגשי המרצה</h4>
                                                <p className="text-lg">{activeSummary.lecturerHighlights}</p>
                                            </div>

                                            <div className={`p-6 border ${borderCard} rounded-2xl flex gap-4 ${bgCard}`}>
                                                <Icon name="lightbulb" size="text-2xl" className="text-amber-500 mt-1" />
                                                <div><h4 className="font-bold text-lg mb-2">מסר מוסרי</h4><p className={textMuted}>{activeSummary.moralConclusion}</p></div>
                                            </div>

                                            <div className={`pt-10 border-t ${borderCard}`}>
                                                <h4 className="text-2xl font-bold mb-6"><Icon name="circle-check" className="text-emerald-500"/> תרגול</h4>
                                                <div className="space-y-6">
                                                    {activeSummary.quiz?.map((q, qI) => (
                                                        <div key={qI} className={`p-6 rounded-2xl border ${borderCard} ${theme==='dark'?'bg-[#0a0f1c]/30':'bg-slate-50'}`}>
                                                            <p className="text-lg mb-4 font-medium">{q.question}</p>
                                                            <div className="grid gap-3">
                                                                {q.options.map((opt, oI) => {
                                                                    const isSelected = activeSummary.userAnswers[qI] === oI;
                                                                    const isCorrect = oI === q.correctIndex;
                                                                    let btnClass = `p-4 rounded-xl border text-right transition-all `;
                                                                    if (activeSummary.quizSubmitted) {
                                                                        if (isCorrect) btnClass += "bg-emerald-100 dark:bg-emerald-900/40 border-emerald-500";
                                                                        else if (isSelected) btnClass += "bg-red-100 dark:bg-red-900/40 border-red-500";
                                                                        else btnClass += "opacity-50 border-slate-300 dark:border-slate-700";
                                                                    } else {
                                                                        btnClass += isSelected ? "bg-amber-100 dark:bg-amber-900/30 border-amber-500" : `${bgCard} border ${borderCard}`;
                                                                    }
                                                                    return <button key={oI} disabled={activeSummary.quizSubmitted} onClick={() => handleQuizAnswer(activeSummary.id, qI, oI)} className={btnClass}>{opt}</button>
                                                                })}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                                {!activeSummary.quizSubmitted && <button onClick={() => submitQuiz(activeSummary.id)} className="mt-8 px-8 py-3 bg-amber-500 text-white font-bold rounded-xl shadow-lg">בדוק תשובות</button>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'exam' && (
                            <div className={`${bgCard} border ${borderCard} p-8 rounded-3xl`}>
                                {!examQuestions.length && !isGeneratingExam && (
                                    <div className="text-center py-10">
                                        <Icon name="graduation-cap" className="text-amber-500 mb-6 block" size="text-6xl" />
                                        <h2 className="text-3xl font-bold mb-6">מבחן מסכם</h2>
                                        <button onClick={handleGenerateExam} className="px-10 py-4 bg-amber-500 text-white rounded-xl font-bold text-xl shadow-lg">התחל מבחן</button>
                                    </div>
                                )}
                                {isGeneratingExam && <div className="text-center py-20"><Icon name="spinner fa-spin" size="text-6xl" className="text-amber-500 mb-4 block"/><h2>מרכיב שאלות...</h2></div>}
                                {examQuestions.length > 0 && !isGeneratingExam && (
                                    <div>
                                        <h2 className="text-2xl font-bold mb-8">מבחן ({examQuestions.length} שאלות)</h2>
                                        {examSubmitted && <div className="text-center p-8 border border-amber-500/30 bg-amber-500/10 rounded-2xl mb-8"><h3 className="text-5xl font-bold text-amber-500 mb-2">{examScore}</h3><p>הציון הסופי שלך</p><button onClick={handleGenerateExam} className="mt-4 px-6 py-2 bg-slate-800 text-white rounded-lg">מבחן חדש</button></div>}
                                        <div className="space-y-8">
                                            {examQuestions.map((q, qI) => (
                                                <div key={qI} className={`p-6 rounded-2xl border ${borderCard} ${theme==='dark'?'bg-[#0a0f1c]/30':'bg-slate-50'}`}>
                                                    <p className="text-lg mb-4">{qI + 1}. {q.question}</p>
                                                    <div className="grid gap-3">
                                                        {q.options.map((opt, oI) => {
                                                            const isCorrect = oI === q.correctIndex;
                                                            const isSelected = examAnswers[qI] === oI;
                                                            let btnClass = `p-4 rounded-xl border text-right transition-all `;
                                                            if (examSubmitted) {
                                                                if (isCorrect) btnClass += "bg-emerald-100 dark:bg-emerald-900/40 border-emerald-500";
                                                                else if (isSelected) btnClass += "bg-red-100 dark:bg-red-900/40 border-red-500";
                                                                else btnClass += "opacity-50 border-slate-300 dark:border-slate-700";
                                                            } else {
                                                                btnClass += isSelected ? "bg-amber-100 dark:bg-amber-900/30 border-amber-500" : `${bgCard} border ${borderCard}`;
                                                            }
                                                            return <button key={oI} disabled={examSubmitted} onClick={() => setExamAnswers(prev => ({...prev, [qI]: oI}))} className={btnClass}>{opt}</button>
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        {!examSubmitted && <button onClick={submitExam} className="mt-8 px-10 py-4 bg-emerald-500 text-white rounded-xl font-bold text-xl shadow-lg w-full">הגש מבחן</button>}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
