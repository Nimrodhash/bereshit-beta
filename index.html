<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוגיות מוסריות בבראשית</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1c] text-slate-800 dark:text-slate-200 transition-colors duration-300">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { createClient } = window.supabase;

        // --- מפתחות סופר-בייס ---
        const supabaseUrl = "https://osxdldgzmxosroskrpgp.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeGRsZGd6bXhvc3Jvc2tycGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzY5NTksImV4cCI6MjA4NzI1Mjk1OX0.wCWmD8SbWs7Kres1pm6BMocMcYNKpHN42jL_n_a5P2k"; 

        const supabaseClient = createClient(supabaseUrl, supabaseAnonKey);

        const Icon = ({ name, className = "", size = "text-base" }) => (
            <i className={`fa-solid fa-${name} ${size} ${className}`}></i>
        );

        const shuffleQuizQuestions = (questions) => {
            if (!questions) return [];
            return questions.map(q => {
                const optionsWithMeta = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correctIndex }));
                for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
                }
                return {
                    ...q,
                    options: optionsWithMeta.map(o => o.text),
                    correctIndex: optionsWithMeta.findIndex(o => o.isCorrect)
                };
            });
        };

        const fetchGemini = async (apiKey, prompt, systemInstruction, schema, attachedFiles = []) => {
            const maxRetries = 3;
            const delays = [1000, 3000, 6000];
            const parts = [{ text: prompt }];
            
            if (attachedFiles && attachedFiles.length > 0) {
                attachedFiles.forEach(file => {
                    if (file.isText) {
                        parts.push({ text: `\n\n[תוכן הקובץ: ${file.name}]\n${file.textContent}\n` });
                    } else if (file.base64) {
                        parts.push({ inlineData: { mimeType: file.type, data: file.base64 } });
                    }
                });
            }

            const payload = {
                contents: [{ role: "user", parts: parts }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: { 
                    responseMimeType: "application/json", 
                    responseSchema: schema 
                }
            };

            for (let i = 0; i < maxRetries; i++) {
                try {
                    // עדכון לגרסת v1 היציבה ושימוש בדגם המעודכן ביותר
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let errorText = await response.text();
                        throw new Error(`Google API Error (${response.status}): ${errorText}`);
                    }

                    const data = await response.json();
                    if (!data.candidates || !data.candidates[0]) throw new Error("תגובה לא תקינה מהבינה המלאכותית.");
                    
                    let textResponse = data.candidates[0].content.parts[0].text;
                    textResponse = textResponse.replace(/^```(json)?\n/gi, '').replace(/\n```$/gi, '').trim();
                    
                    return JSON.parse(textResponse);
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('input');
            const [activeSummaryId, setActiveSummaryId] = useState(null);
            const [theme, setTheme] = useState('dark');
            const [user, setUser] = useState(null);
            const [geminiApiKey, setGeminiApiKey] = useState(null);
            const [isLoadingConfig, setIsLoadingConfig] = useState(true);
            
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const CORRECT_PASSWORD = "1234";

            const [deleteModalOpen, setDeleteModalOpen] = useState(false);
            const [deleteSummaryId, setDeleteSummaryId] = useState(null);
            const [deletePassword, setDeletePassword] = useState('');

            const [topicName, setTopicName] = useState('');
            const [materialInput, setMaterialInput] = useState('');
            const [highlightsInput, setHighlightsInput] = useState('');
            const [attachedFiles, setAttachedFiles] = useState([]);
            const fileInputRef = useRef(null);
            
            const [summaries, setSummaries] = useState([]);
            const [isProcessingSummary, setIsProcessingSummary] = useState(false);
            
            const [examQuestions, setExamQuestions] = useState([]);
            const [isGeneratingExam, setIsGeneratingExam] = useState(false);
            const [examAnswers, setExamAnswers] = useState({});
            const [examSubmitted, setExamSubmitted] = useState(false);
            const [examScore, setExamScore] = useState(0);

            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });

            const showAlert = (title, message) => setModal({ isOpen: true, title, message, type: 'alert', onConfirm: null });
            const showConfirm = (title, message, onConfirm) => setModal({ isOpen: true, title, message, type: 'confirm', onConfirm });
            const closeModal = () => setModal({ ...modal, isOpen: false });

            useEffect(() => {
                const loadConfigAndAuth = async () => {
                    try {
                        setIsLoadingConfig(true);
                        // משיכת המפתח מ-Supabase RPC
                        const { data, error } = await supabaseClient.rpc('get_gemini_api_key');
                        if (error) throw error;
                        if (data) {
                            setGeminiApiKey(data);
                        } else {
                            console.error("API key function returned null. Check app_config table.");
                        }

                        // בדיקת התחברות
                        const { data: { session } } = await supabaseClient.auth.getSession();
                        if (session?.user) {
                            setUser(session.user);
                        } else {
                            const { data: signInData, error: signInError } = await supabaseClient.auth.signInAnonymously();
                            if (signInError) console.error("Sign in error:", signInError);
                            if (signInData?.user) setUser(signInData.user);
                        }
                    } catch (err) {
                        console.error("Critical initialization error:", err);
                    } finally {
                        setIsLoadingConfig(false);
                    }
                };

                loadConfigAndAuth();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange((event, session) => {
                    if (session?.user) setUser(session.user);
                });

                return () => authListener.subscription.unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const fetchSummaries = async () => {
                    const { data, error } = await supabaseClient
                        .from('summaries')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('created_at', { ascending: false });

                    if (data) {
                        setSummaries(data.map(row => ({ id: Number(row.id), ...row.summary_data })));
                    }
                    if (error) console.error("Error fetching summaries:", error);
                };
                fetchSummaries();
            }, [user]);

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);

            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.name.toLowerCase().match(/\.(ppt|pptx)$/) || file.type.includes('presentation')) {
                        showAlert("המרת מצגת ל-PDF", `אנא שמור את הקובץ ${file.name} כ-PDF והעלה מחדש.`);
                        return;
                    }
                    if (file.size > 4 * 1024 * 1024) {
                        showAlert("קובץ גדול מדי", `הקובץ ${file.name} חורג מ-4MB.`);
                        return;
                    }
                    const isTextExt = file.name.toLowerCase().endsWith('.txt') || file.type === 'text/plain';
                    const reader = new FileReader();
                    if (isTextExt) {
                        reader.onload = (event) => setAttachedFiles(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, type: 'text/plain', isText: true, textContent: event.target.result }]);
                        reader.readAsText(file);
                    } else {
                        reader.onload = (event) => {
                            const dataUrl = event.target.result;
                            setAttachedFiles(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, type: file.type, isText: false, dataUrl, base64: dataUrl.split(',')[1] }]);
                        };
                        reader.readAsDataURL(file);
                    }
                });
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const removeAttachedFile = (id) => setAttachedFiles(prev => prev.filter(f => f.id !== id));

            const handleProcessMaterial = async () => {
                if (!geminiApiKey) return showAlert("שגיאת טעינה", "מפתח ה-API לא נטען. ודא שהגדרת את הפונקציה get_gemini_api_key בסופר-בייס והזנת את המפתח לטבלת app_config.");
                if (!materialInput.trim() && attachedFiles.length === 0) return showAlert("חסר תוכן", "אנא הכנס חומר לפני העיבוד.");
                setIsProcessingSummary(true); setActiveTab('summaries'); setActiveSummaryId(null);

                const systemInstruction = `אתה סייען למידה אקדמי וערכי לקורס 'סוגיות מוסריות בספר בראשית'. 
1. הפרד בין תתי-נושאים (פרקים/סוגיות). אל תאחד הכל.
2. לכל תת-נושא, הצמד את הפרשנים הרלוונטיים לו בלבד.
3. דגש מרכזי ל"דגשי המרצה".
4. הפק מסר מוסרי וערכי מסכם.
5. צור 5 שאלות חזרה מהחומר בלבד.
החזר JSON תקין.`;

                let prompt = `${topicName.trim() ? `נושא: ${topicName}\n\n` : ''}חומר הלימוד:\n${materialInput}\n\nדגשי המרצה:\n${highlightsInput || 'אין'}`;
                
                const schema = {
                    type: "OBJECT",
                    properties: {
                        title: { type: "STRING" }, introduction: { type: "STRING" },
                        subTopics: { type: "ARRAY", items: { type: "OBJECT", properties: { topicTitle: { type: "STRING" }, explanation: { type: "STRING" }, commentators: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, opinion: { type: "STRING" } }, required: ["name", "opinion"] } } }, required: ["topicTitle", "explanation", "commentators"] } },
                        lecturerHighlights: { type: "STRING" }, moralConclusion: { type: "STRING" },
                        quiz: { type: "ARRAY", items: { type: "OBJECT", properties: { question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } }, correctIndex: { type: "INTEGER" } }, required: ["question", "options", "correctIndex"] } }
                    }, required: ["title", "introduction", "subTopics", "lecturerHighlights", "moralConclusion", "quiz"]
                };

                try {
                    const result = await fetchGemini(geminiApiKey, prompt, systemInstruction, schema, attachedFiles);
                    if (result.quiz) result.quiz = shuffleQuizQuestions(result.quiz);
                    const newId = Date.now();
                    const newSummary = { ...result, id: newId, userAnswers: {}, quizSubmitted: false };
                    
                    if (user) {
                        const { error } = await supabaseClient.from('summaries').upsert({ id: newId.toString(), user_id: user.id, summary_data: newSummary });
                        if (error) console.error("Database save error:", error);
                    }
                    
                    setSummaries(prev => [newSummary, ...prev]);
                    setTopicName(''); setMaterialInput(''); setHighlightsInput(''); setAttachedFiles([]); setActiveSummaryId(newId);
                } catch (error) {
                    console.error("Processing error:", error);
                    showAlert("שגיאה בעיבוד", `פרטי השגיאה: ${error.message}`); 
                    setActiveTab('input');
                } finally {
                    setIsProcessingSummary(false);
                }
            };

            const handleGenerateExam = async () => {
                if (!geminiApiKey) return showAlert("שגיאה", "מפתח ה-API לא נטען.");
                if (summaries.length === 0) return showAlert("אין חומר", "הזן לפחות סיכום אחד.");
                setIsGeneratingExam(true); setExamSubmitted(false); setExamAnswers({});
                
                const material = summaries.map(s => `נושא: ${s.title}\n${s.subTopics.map(st => st.explanation).join('\n')}`).join('\n---\n');
                const system = `צור מבחן של עד 30 שאלות אמריקאיות מהחומר הבא בלבד. החזר JSON.`;
                const schema = { type: "OBJECT", properties: { questions: { type: "ARRAY", items: { type: "OBJECT", properties: { question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } }, correctIndex: { type: "INTEGER" } }, required: ["question", "options", "correctIndex"] } } }, required: ["questions"] };

                try {
                    const result = await fetchGemini(geminiApiKey, material, system, schema, []);
                    if (result?.questions) setExamQuestions(shuffleQuizQuestions(result.questions));
                } catch (error) {
                    console.error("Exam generation error:", error);
                    showAlert("שגיאה", `לא ניתן לייצר מבחן כרגע: ${error.message}`);
                } finally {
                    setIsGeneratingExam(false);
                }
            };

            const handleQuizAnswer = (summaryId, qIdx, aIdx) => {
                setSummaries(prev => prev.map(s => {
                    if (s.id === summaryId) {
                        const upd = { ...s, userAnswers: { ...s.userAnswers, [qIdx]: aIdx } };
                        if (user) supabaseClient.from('summaries').update({ summary_data: upd }).eq('id', summaryId.toString());
                        return upd;
                    }
                    return s;
                }));
            };

            const submitQuiz = (summaryId) => {
                setSummaries(prev => prev.map(s => {
                    if (s.id === summaryId) {
                        const upd = { ...s, quizSubmitted: true };
                        if (user) supabaseClient.from('summaries').update({ summary_data: upd }).eq('id', summaryId.toString());
                        return upd;
                    }
                    return s;
                }));
            };

            const handleDeleteSummary = (id) => { setDeleteSummaryId(id); setDeletePassword(''); setDeleteModalOpen(true); };
            const confirmDelete = async () => {
                if (deletePassword !== CORRECT_PASSWORD) return showAlert("שגיאה", "סיסמא שגויה.");
                if (user) await supabaseClient.from('summaries').delete().eq('id', deleteSummaryId.toString());
                setSummaries(prev => prev.filter(s => s.id !== deleteSummaryId));
                setActiveSummaryId(null); setDeleteModalOpen(false);
            };

            const submitExam = () => {
                let correct = 0;
                examQuestions.forEach((q, i) => { if (examAnswers[i] === q.correctIndex) correct++; });
                setExamScore(Math.round((correct / examQuestions.length) * 100)); setExamSubmitted(true); window.scrollTo(0,0);
            };

            const activeSummary = summaries.find(s => s.id === activeSummaryId);
            const bgApp = theme === 'dark' ? 'bg-[#0a0f1c]' : 'bg-slate-50';
            const textApp = theme === 'dark' ? 'text-slate-200' : 'text-slate-800';
            const bgCard = theme === 'dark' ? 'bg-[#131c31]' : 'bg-white';
            const borderCard = theme === 'dark' ? 'border-white/5' : 'border-slate-200';

            return (
                <div className={`min-h-screen ${bgApp} ${textApp}`}>
                    {modal.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className={`${bgCard} border ${borderCard} p-6 rounded-2xl max-w-sm w-full shadow-2xl`}>
                                <h3 className="text-xl font-bold mb-4">{modal.title}</h3>
                                <p className="text-slate-400 mb-8 whitespace-pre-wrap">{modal.message}</p>
                                <div className="flex justify-end gap-3">
                                    {modal.type === 'confirm' && <button onClick={closeModal} className="px-4 py-2">ביטול</button>}
                                    <button onClick={() => { if(modal.onConfirm) modal.onConfirm(); closeModal(); }} className="px-6 py-2 bg-amber-600 text-white rounded-xl">אישור</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-4">
                            <div className={`${bgCard} border ${borderCard} p-6 rounded-2xl max-w-sm w-full`}>
                                <h3 className="text-xl font-bold mb-4">אימות מחיקה</h3>
                                <input type="password" value={deletePassword} onChange={e => setDeletePassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-6 text-center" placeholder="הזן סיסמא..." autoFocus />
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setDeleteModalOpen(false)}>ביטול</button>
                                    <button onClick={confirmDelete} className="bg-red-600 text-white px-6 py-2 rounded-xl">מחק</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className={`sticky top-0 z-50 border-b ${borderCard} ${theme==='dark'?'bg-[#0f172a]/90':'bg-white/90'} backdrop-blur-xl`}>
                        <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-amber-500 rounded-lg text-white"><Icon name="book-open" size="text-xl" /></div>
                                <h1 className="text-xl font-bold">סוגיות מוסריות בבראשית</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                {isLoadingConfig && <Icon name="spinner fa-spin" className="text-amber-500" />}
                                <button onClick={toggleTheme} className="p-2 rounded-full bg-slate-800 text-amber-400"><Icon name={theme==='dark'?'sun':'moon'} /></button>
                            </div>
                        </div>
                        <div className="max-w-5xl mx-auto px-4 flex gap-6 overflow-x-auto no-scrollbar">
                            <button onClick={()=>setActiveTab('input')} className={`py-4 border-b-2 transition-all ${activeTab==='input'?'border-amber-500 text-amber-500':'border-transparent text-slate-500'}`}>הזנת חומר</button>
                            <button onClick={()=>{setActiveTab('summaries'); setActiveSummaryId(null);}} className={`py-4 border-b-2 transition-all ${activeTab==='summaries'?'border-amber-500 text-amber-500':'border-transparent text-slate-500'}`}>סיכומים</button>
                            <button onClick={()=>setActiveTab('exam')} className={`py-4 border-b-2 transition-all ${activeTab==='exam'?'border-amber-500 text-amber-500':'border-transparent text-slate-500'}`}>מבחן</button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {activeTab === 'input' && (
                            <div className="max-w-2xl mx-auto">
                                {!isUnlocked ? (
                                    <div className={`${bgCard} border ${borderCard} p-8 rounded-3xl text-center shadow-xl`}>
                                        <Icon name="lock" size="text-4xl" className="text-amber-500 mb-4 block" />
                                        <h2 className="text-2xl font-bold mb-4">כניסה למערכת</h2>
                                        <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && (passwordInput===CORRECT_PASSWORD?setIsUnlocked(true):showAlert("טעות","סיסמא לא נכונה"))} className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-center mb-4" placeholder="הזן סיסמא..." />
                                        <button onClick={()=>passwordInput===CORRECT_PASSWORD?setIsUnlocked(true):showAlert("טעות","סיסמא לא נכונה")} className="w-full py-4 bg-amber-500 text-white font-bold rounded-xl">היכנס</button>
                                    </div>
                                ) : (
                                    <div className={`${bgCard} border ${borderCard} p-8 rounded-3xl shadow-xl space-y-6`}>
                                        <h2 className="text-2xl font-bold text-amber-500">הכנת חומר חדש</h2>
                                        {!geminiApiKey && !isLoadingConfig && <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-500 text-sm">המערכת לא זיהתה מפתח API. ודא שהגדרת את הפונקציה get_gemini_api_key בסופר-בייס.</div>}
                                        <input type="text" value={topicName} onChange={e=>setTopicName(e.target.value)} className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl" placeholder="שם הנושא..." />
                                        <textarea value={materialInput} onChange={e=>setMaterialInput(e.target.value)} className="w-full h-48 bg-slate-900 border border-slate-700 p-4 rounded-xl resize-none" placeholder="הדבק כאן את החומר..." />
                                        <textarea value={highlightsInput} onChange={e=>setHighlightsInput(e.target.value)} className="w-full h-24 bg-amber-500/5 border border-amber-500/20 p-4 rounded-xl resize-none" placeholder="דגשי המרצה (אם יש)..." />
                                        <div className="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-700">
                                            <span className="text-sm text-slate-400">העלאת PDF/תמונה/טקסט</span>
                                            <button onClick={()=>fileInputRef.current.click()} className="px-4 py-2 border border-slate-600 rounded-lg">בחר קובץ</button>
                                            <input type="file" multiple className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
                                        </div>
                                        {attachedFiles.length > 0 && <div className="grid grid-cols-2 gap-2">{attachedFiles.map(f=><div key={f.id} className="text-xs bg-slate-800 p-2 rounded flex justify-between"><span>{f.name}</span><button onClick={()=>removeAttachedFile(f.id)} className="text-red-500">X</button></div>)}</div>}
                                        <button onClick={handleProcessMaterial} disabled={isProcessingSummary || !geminiApiKey} className="w-full py-4 bg-amber-600 text-white font-bold rounded-xl flex justify-center gap-2 disabled:opacity-50">
                                            {isProcessingSummary ? <><Icon name="spinner fa-spin"/>מעבד...</> : <><Icon name="wand-sparkles"/>צור סיכום</>}
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'summaries' && (
                            <div>
                                {isProcessingSummary && <div className="text-center py-20"><Icon name="spinner fa-spin" size="text-5xl" className="text-amber-500 mb-4 block" /><h3>מנתח חומר...</h3></div>}
                                {!isProcessingSummary && summaries.length === 0 && <div className="text-center py-20 opacity-50"><Icon name="folder-open" size="text-5xl" className="mb-4 block" /><h3>אין עדיין סיכומים שמורים.</h3></div>}
                                
                                {!activeSummaryId && summaries.length > 0 && (
                                    <div className="grid md:grid-cols-2 gap-6">
                                        {summaries.map(s => (
                                            <button key={s.id} onClick={()=>setActiveSummaryId(s.id)} className={`${bgCard} border ${borderCard} p-6 rounded-2xl text-right hover:border-amber-500/50 transition-all`}>
                                                <h3 className="text-xl font-bold text-amber-500 mb-2">{s.title}</h3>
                                                <p className="text-sm text-slate-400 line-clamp-2">{s.introduction}</p>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {activeSummary && (
                                    <div className={`${bgCard} border ${borderCard} rounded-3xl overflow-hidden shadow-2xl p-6 md:p-10 space-y-10`}>
                                        <div className="flex gap-4 mb-6">
                                            <button onClick={()=>setActiveSummaryId(null)} className="text-slate-400"><Icon name="chevron-right"/> חזור</button>
                                            <button onClick={()=>handleDeleteSummary(activeSummary.id)} className="text-red-500"><Icon name="trash"/> מחק</button>
                                        </div>
                                        <h2 className="text-4xl font-bold text-amber-500">{activeSummary.title}</h2>
                                        <p className="text-xl leading-relaxed">{activeSummary.introduction}</p>
                                        
                                        {activeSummary.subTopics?.map((sub, i) => (
                                            <div key={i} className="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl">
                                                <h4 className="text-2xl font-bold text-amber-400 mb-4">{i+1}. {sub.topicTitle}</h4>
                                                <p className="text-lg mb-6 leading-relaxed">{sub.explanation}</p>
                                                <div className="grid md:grid-cols-2 gap-4">
                                                    {sub.commentators?.map((c, ci) => (
                                                        <div key={ci} className={`${bgCard} p-4 rounded-xl border border-slate-700`}><h6 className="font-bold text-amber-500"><Icon name="quote-right" className="ml-2"/>{c.name}</h6><p className="text-sm text-slate-400">{c.opinion}</p></div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        
                                        <div className="bg-amber-500/10 border border-amber-500/30 p-6 rounded-2xl">
                                            <h4 className="font-bold text-amber-500 mb-2"><Icon name="star" className="ml-2"/>דגשי המרצה:</h4>
                                            <p>{activeSummary.lecturerHighlights}</p>
                                        </div>

                                        <div className="pt-10 border-t border-slate-800">
                                            <h4 className="text-2xl font-bold mb-6">תרגול הבנה</h4>
                                            <div className="space-y-6">
                                                {activeSummary.quiz?.map((q, qi) => (
                                                    <div key={qi} className="bg-slate-900/30 p-6 rounded-2xl border border-slate-800">
                                                        <p className="text-lg mb-4">{q.question}</p>
                                                        <div className="grid gap-2">
                                                            {q.options.map((opt, oi) => {
                                                                const sel = activeSummary.userAnswers[qi] === oi;
                                                                const cor = oi === q.correctIndex;
                                                                let cl = "p-4 rounded-xl border text-right transition-all ";
                                                                if (activeSummary.quizSubmitted) {
                                                                    if (cor) cl += "bg-emerald-500/20 border-emerald-500 text-emerald-400";
                                                                    else if (sel) cl += "bg-red-500/20 border-red-500 text-red-400";
                                                                    else cl += "opacity-30 border-slate-800";
                                                                } else {
                                                                    cl += sel ? "bg-amber-500/20 border-amber-500 text-amber-400" : "bg-slate-800 border-slate-700";
                                                                }
                                                                return <button key={oi} disabled={activeSummary.quizSubmitted} onClick={()=>handleQuizAnswer(activeSummary.id, qi, oi)} className={cl}>{opt}</button>
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            {!activeSummary.quizSubmitted && <button onClick={()=>submitQuiz(activeSummary.id)} className="mt-6 px-10 py-3 bg-amber-600 text-white font-bold rounded-xl shadow-lg">בדוק תשובות</button>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'exam' && (
                            <div className={`${bgCard} border ${borderCard} p-10 rounded-3xl shadow-xl text-center`}>
                                {!examQuestions.length && !isGeneratingExam && (
                                    <>
                                        <Icon name="graduation-cap" size="text-6xl" className="text-amber-500 mb-6 block" />
                                        <h2 className="text-3xl font-bold mb-6">מבחן סימולציה מסכם</h2>
                                        <p className="text-slate-400 mb-8">המערכת תייצר 30 שאלות מכל חומר הלימוד שצברת.</p>
                                        <button onClick={handleGenerateExam} disabled={!geminiApiKey} className="px-12 py-4 bg-amber-600 text-white font-bold text-xl rounded-xl shadow-lg disabled:opacity-50">התחל מבחן</button>
                                    </>
                                )}
                                {isGeneratingExam && <div className="py-20"><Icon name="spinner fa-spin" size="text-6xl" className="text-amber-500 mb-4 block"/><h3>מרכיב שאלות...</h3></div>}
                                {examQuestions.length > 0 && !isGeneratingExam && (
                                    <div className="text-right">
                                        <h2 className="text-2xl font-bold mb-8 text-amber-500">מבחן מסכם ({examQuestions.length} שאלות)</h2>
                                        {examSubmitted && <div className="text-center p-6 bg-amber-500/10 rounded-2xl mb-8"><h3 className="text-5xl font-bold text-amber-500">{examScore}</h3><p>ציון סופי</p></div>}
                                        <div className="space-y-8">
                                            {examQuestions.map((q, qi) => (
                                                <div key={qi} className="p-6 bg-slate-900/40 rounded-2xl border border-slate-800">
                                                    <p className="text-lg mb-4">{qi+1}. {q.question}</p>
                                                    <div className="grid gap-2">
                                                        {q.options.map((opt, oi) => {
                                                            const cor = oi === q.correctIndex;
                                                            const sel = examAnswers[qi] === oi;
                                                            let cl = "p-4 rounded-xl border text-right transition-all ";
                                                            if (examSubmitted) {
                                                                if (cor) cl += "bg-emerald-500/20 border-emerald-500";
                                                                else if (sel) cl += "bg-red-500/20 border-red-500";
                                                                else cl += "opacity-30 border-slate-800";
                                                            } else {
                                                                cl += sel ? "bg-amber-500/20 border-amber-500" : "bg-slate-800 border-slate-700";
                                                            }
                                                            return <button key={oi} disabled={examSubmitted} onClick={()=>setExamAnswers(p=>({...p,[qi]:oi}))} className={cl}>{opt}</button>
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        {!examSubmitted && <button onClick={submitExam} className="mt-8 px-10 py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg w-full">הגש מבחן</button>}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
